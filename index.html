<section id="ac" class="tab-content hidden">
    <div class="glass-card p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="space-y-5">
                <h3 class="text-xl font-bold text-cyan-400 uppercase tracking-widest">AC Circuit Analyzer</h3>
                
                <div>
                    <label class="text-[10px] text-slate-500 uppercase">RMS Voltage (V)</label>
                    <input type="number" id="ac-v-in" placeholder="e.g. 230" class="w-full p-3 rounded-lg mt-1">
                </div>
                
                <div>
                    <label class="text-[10px] text-slate-500 uppercase">Current (I) in Amps</label>
                    <input type="number" id="ac-i-in" placeholder="e.g. 5" class="w-full p-3 rounded-lg mt-1">
                </div>
                
                <div>
                    <label class="text-[10px] text-slate-500 uppercase">Power Factor (cos φ)</label>
                    <input type="number" id="ac-pf-in" placeholder="0.1 to 1.0" step="0.01" value="0.8" class="w-full p-3 rounded-lg mt-1">
                </div>

                <button onclick="calculateACPower()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 py-3 rounded-lg font-bold hover:shadow-[0_0_20px_rgba(0,242,255,0.4)] transition-all">
                    RUN ANALYSIS
                </button>
            </div>

            <div id="ac-dash" class="flex flex-col justify-center bg-black/40 p-6 rounded-2xl border border-white/5">
                <div class="text-center mb-6">
                    <p id="p-active" class="text-4xl font-bold text-cyan-400">0 W</p>
                    <p class="text-[10px] uppercase text-slate-500 tracking-widest">Active Power (P)</p>
                </div>
                
                <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                    <div class="text-center">
                        <p id="p-apparent" class="text-lg font-bold text-white">0 VA</p>
                        <p class="text-[9px] uppercase text-slate-500">Apparent (S)</p>
                    </div>
                    <div class="text-center">
                        <p id="p-reactive" class="text-lg font-bold text-pink-500">0 VAR</p>
                        <p class="text-[9px] uppercase text-slate-500">Reactive (Q)</p>
                    </div>
                </div>
                
                <div class="mt-6 p-3 bg-cyan-500/10 rounded-lg text-center">
                    <p id="p-angle" class="text-xs text-cyan-300">Phase Angle (φ): 0°</p>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
// Ei function-ti script tag er bhetore thakbe
function calculateACPower() {
    const V = parseFloat(document.getElementById('ac-v-in').value);
    const I = parseFloat(document.getElementById('ac-i-in').value);
    const PF = parseFloat(document.getElementById('ac-pf-in').value);

    if (isNaN(V) || isNaN(I) || isNaN(PF)) {
        alert("Please enter valid Voltage, Current and Power Factor!");
        return;
    }

    if (PF > 1 || PF < 0) {
        alert("Power Factor must be between 0 and 1");
        return;
    }

    // Calculations
    const S = V * I;                    // Apparent Power (VA)
    const P = S * PF;                   // Active Power (W)
    const Q = Math.sqrt(Math.pow(S, 2) - Math.pow(P, 2)); // Reactive Power (VAR)
    const angle = Math.acos(PF) * (180 / Math.PI);        // Phase Angle in Degrees

    // UI Updates with Animation
    animateValue("p-active", P, " W");
    animateValue("p-apparent", S, " VA");
    animateValue("p-reactive", Q, " VAR");
    document.getElementById('p-angle').innerText = `Phase Angle (φ): ${angle.toFixed(2)}°`;
}

// Result smooth korar jonno choto ekta helper function
function animateValue(id, value, unit) {
    const obj = document.getElementById(id);
    obj.innerText = value.toFixed(2) + unit;
}
</script>
