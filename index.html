<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroMaster Pro | Shamiul Hasan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --primary: #00f2ff; --bg-dark: #050b18; }
        body { font-family: 'Rajdhani', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #050b18); color: #e2e8f0; min-height: 100vh; overflow-x: hidden; margin: 0; padding: 15px; }
        .bg-dots { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(0, 242, 255, 0.1) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; animation: moveBg 20s linear infinite; }
        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 100% 100%; } }
        .glass-card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); }
        .nav-btn { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 1px; color: #94a3b8; transition: 0.3s; position: relative; padding: 12px 8px; flex-shrink: 0; }
        .nav-btn.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .nav-btn.active::after { content: ''; position: absolute; bottom: 0; left: 10%; width: 80%; height: 2px; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .resistor-visual { background: #d4a373; height: 55px; width: 260px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; border: 3px solid rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        .band { width: 12px; height: 100%; transition: 0.4s; box-shadow: 1px 0 3px rgba(0,0,0,0.2); }
        select, input { background: rgba(2, 6, 23, 0.9) !important; border: 1px solid #1e293b !important; color: var(--primary) !important; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-size: 14px; font-weight: bold; }
        .tab-content { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="max-w-4xl mx-auto">
        <header class="glass-card p-5 mb-6 border-b-2 border-cyan-500 text-center md:text-left">
            <h1 class="text-2xl font-bold tracking-tighter text-white" style="font-family: 'Orbitron';">ELECTRO<span class="text-cyan-400">MASTER</span> PRO</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-[0.2em]">Dev: SHAMIUL HASAN | ICST Engineer</p>
            <div class="flex justify-center md:justify-start gap-5 mt-3 text-xl">
                <a href="https://www.linkedin.com/in/shamiul-hasan-86a4623a8" target="_blank" class="hover:text-cyan-400"><i class="fab fa-linkedin"></i></a>
                <a href="https://www.instagram.com/shamiulhasan08" target="_blank" class="hover:text-pink-500"><i class="fab fa-instagram"></i></a>
                <div class="border-l border-slate-700 pl-4">
                    <span class="text-[10px] text-green-400 font-bold uppercase">System Active</span>
                </div>
            </div>
        </header>

        <nav class="flex justify-start md:justify-center gap-2 mb-8 overflow-x-auto no-scrollbar border-b border-slate-800">
            <button onclick="switchTab('resistor', this)" class="nav-btn active">RESISTOR</button>
            <button onclick="switchTab('networks', this)" class="nav-btn">NETWORKS</button>
            <button onclick="switchTab('ohms', this)" class="nav-btn">OHM'S LAW</button>
            <button onclick="switchTab('ac', this)" class="nav-btn">AC ANALYSIS</button>
        </nav>

        <main>
            <section id="resistor" class="tab-content">
                <div class="glass-card p-6 text-center">
                    <div class="flex flex-col items-center gap-6 mb-8">
                        <div class="resistor-visual" id="res-image">
                            </div>
                        <h2 id="res-val" class="text-4xl font-bold text-cyan-400">0 Ω</h2>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="text-[10px] text-slate-500 uppercase block mb-1">Configuration</label>
                            <select id="band-qty" onchange="initResistor()">
                                <option value="4">4 Bands</option>
                                <option value="5">5 Bands</option>
                                <option value="6">6 Bands</option>
                            </select>
                        </div>
                        <div id="band-selectors" class="contents"></div>
                    </div>
                </div>
            </section>

            <section id="networks" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="glass-card p-5 border-t-2 border-emerald-500">
                        <h3 class="text-xs font-bold text-emerald-400 mb-3">RESISTANCE (Ω)</h3>
                        <input type="text" id="r-list" placeholder="10, 22..." class="mb-3">
                        <div class="flex gap-2">
                            <button onclick="calcNet('R','S')" class="flex-1 bg-emerald-600/20 py-2 rounded text-[10px]">SERIES</button>
                            <button onclick="calcNet('R','P')" class="flex-1 bg-slate-800 py-2 rounded text-[10px]">PARALLEL</button>
                        </div>
                        <div id="r-res" class="mt-3 text-cyan-400 font-mono text-sm">Total: --</div>
                    </div>
                    <div class="glass-card p-5 border-t-2 border-blue-500">
                        <h3 class="text-xs font-bold text-blue-400 mb-3">CAPACITANCE (µF)</h3>
                        <input type="text" id="c-list" placeholder="1, 10..." class="mb-3">
                        <div class="flex gap-2">
                            <button onclick="calcNet('C','S')" class="flex-1 bg-blue-600/20 py-2 rounded text-[10px]">SERIES</button>
                            <button onclick="calcNet('C','P')" class="flex-1 bg-slate-800 py-2 rounded text-[10px]">PARALLEL</button>
                        </div>
                        <div id="c-res" class="mt-3 text-blue-400 font-mono text-sm">Total: --</div>
                    </div>
                    <div class="glass-card p-5 border-t-2 border-yellow-500">
                        <h3 class="text-xs font-bold text-yellow-400 mb-3">INDUCTANCE (mH)</h3>
                        <input type="text" id="l-list" placeholder="2.2, 10..." class="mb-3">
                        <div class="flex gap-2">
                            <button onclick="calcNet('L','S')" class="flex-1 bg-yellow-600/20 py-2 rounded text-[10px]">SERIES</button>
                            <button onclick="calcNet('L','P')" class="flex-1 bg-slate-800 py-2 rounded text-[10px]">PARALLEL</button>
                        </div>
                        <div id="l-res" class="mt-3 text-yellow-400 font-mono text-sm">Total: --</div>
                    </div>
                </div>
            </section>

            <section id="ohms" class="tab-content hidden">
                <div class="glass-card p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <input type="number" id="ov" placeholder="Voltage (V)">
                            <input type="number" id="oi" placeholder="Current (A)">
                            <input type="number" id="or" placeholder="Resistance (Ω)">
                            <button onclick="calcOhms()" class="w-full bg-cyan-600 py-3 rounded-lg font-bold">CALCULATE</button>
                        </div>
                        <div id="ohms-dash" class="bg-black/40 rounded-xl p-6 flex flex-col justify-center text-center">
                            <p class="text-slate-500">Result will appear here</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="ac" class="tab-content hidden">
                <div class="glass-card p-6 max-w-lg mx-auto">
                    <div class="space-y-4">
                        <input type="number" id="ac-v" placeholder="Voltage (V)">
                        <input type="number" id="ac-i" placeholder="Current (A)">
                        <input type="number" id="ac-pf" placeholder="Power Factor (0.0 - 1.0)">
                        <button onclick="calcAC()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold">ANALYZE</button>
                    </div>
                    <div id="ac-res" class="mt-6 grid grid-cols-2 gap-3"></div>
                </div>
            </section>
        </main>

        <footer class="mt-10 text-center text-slate-600 text-[10px] pb-5">
            © 2026 SHAMIUL HASAN | ICST ELECTRICAL TECHNOLOGY
        </footer>
    </div>

    <script>
        const colorData = {
            black: {v:0, m:1, h:'#000'}, brown: {v:1, m:10, h:'#8B4513'},
            red: {v:2, m:100, h:'#f00'}, orange: {v:3, m:1000, h:'#ffa500'},
            yellow: {v:4, m:10000, h:'#ff0'}, green: {v:5, m:100000, h:'#008000'},
            blue: {v:6, m:1000000, h:'#00f'}, violet: {v:7, m:10000000, h:'#ee82ee'},
            grey: {v:8, m:100000000, h:'#808080'}, white: {v:9, m:1000000000, h:'#fff'},
            gold: {v:null, m:0.1, t:5, h:'#ffd700'}, silver: {v:null, m:0.01, t:10, h:'#c0c0c0'}
        };

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            btn.classList.add('active');
        }

        function initResistor() {
            const count = parseInt(document.getElementById('band-qty').value);
            const container = document.getElementById('band-selectors');
            const visual = document.getElementById('res-image');
            
            container.innerHTML = '';
            visual.innerHTML = '';
            
            let labels = count == 4 ? ['Digit 1', 'Digit 2', 'Multiplier', 'Tolerance'] : 
                         count == 5 ? ['Digit 1', 'Digit 2', 'Digit 3', 'Multiplier', 'Tolerance'] :
                                     ['Digit 1', 'Digit 2', 'Digit 3', 'Multiplier', 'Tolerance', 'Temp'];

            for(let i=0; i<count; i++) {
                // Create Dropdowns
                let opts = '';
                Object.keys(colorData).forEach(c => {
                    opts += `<option value="${c}" style="color:${colorData[c].h}">${c.toUpperCase()}</option>`;
                });
                container.innerHTML += `<div><label class="text-[10px] text-slate-500">${labels[i]}</label>
                <select id="b-${i}" onchange="updateResistor()">${opts}</select></div>`;
                
                // Create Visual Bands
                visual.innerHTML += `<div id="vband-${i}" class="band"></div>`;
            }
            updateResistor();
        }

        function updateResistor() {
            const count = parseInt(document.getElementById('band-qty').value);
            let val = 0;
            
            for(let i=0; i<count; i++) {
                const color = document.getElementById('b-'+i).value;
                document.getElementById('vband-'+i).style.backgroundColor = colorData[color].h;
            }

            if(count == 4) {
                val = (colorData[document.getElementById('b-0').value].v * 10 + colorData[document.getElementById('b-1').value].v) * colorData[document.getElementById('b-2').value].m;
            } else {
                val = (colorData[document.getElementById('b-0').value].v * 100 + colorData[document.getElementById('b-1').value].v * 10 + colorData[document.getElementById('b-2').value].v) * colorData[document.getElementById('b-3').value].m;
            }

            document.getElementById('res-val').innerText = val >= 1e6 ? (val/1e6).toFixed(2) + " MΩ" : val >= 1000 ? (val/1000).toFixed(2) + " kΩ" : val.toFixed(1) + " Ω";
        }

        function calcNet(type, mode) {
            const vals = document.getElementById(type.toLowerCase()+'-list').value.split(',').map(Number).filter(n => n > 0);
            if(vals.length === 0) return;
            let res = (type === 'C') ? (mode === 'P' ? vals.reduce((a,b)=>a+b) : 1/vals.reduce((a,b)=>a+(1/b),0)) : (mode === 'S' ? vals.reduce((a,b)=>a+b) : 1/vals.reduce((a,b)=>a+(1/b),0));
            const units = {R:'Ω', C:'µF', L:'mH'};
            document.getElementById(type.toLowerCase()+'-res').innerHTML = `Total: <b class="text-white">${res.toFixed(2)} ${units[type]}</b>`;
        }

        function calcOhms() {
            let v = parseFloat(document.getElementById('ov').value), i = parseFloat(document.getElementById('oi').value), r = parseFloat(document.getElementById('or').value);
            if(v && i) r = v/i; else if(v && r) i = v/r; else if(i && r) v = i*r;
            document.getElementById('ohms-dash').innerHTML = `<div class="text-3xl font-bold text-cyan-400">${(v*i).toFixed(2)}W</div><div class="text-[10px] text-slate-500 uppercase">Power</div><div class="mt-4 text-xs text-left space-y-1"><div>V: ${v.toFixed(1)}V</div><div>I: ${i.toFixed(2)}A</div><div>R: ${r.toFixed(1)}Ω</div></div>`;
        }

        function calcAC() {
            const v = parseFloat(document.getElementById('ac-v').value), i = parseFloat(document.getElementById('ac-i').value), pf = parseFloat(document.getElementById('ac-pf').value);
            if(!v || !i || !pf) return;
            const p = v*i*pf, s = v*i, q = Math.sqrt(s*s - p*p);
            document.getElementById('ac-res').innerHTML = `<div class="bg-black/40 p-3 rounded"><p class="text-[10px]">WATT</p><p class="font-bold text-emerald-400">${p.toFixed(1)}</p></div><div class="bg-black/40 p-3 rounded"><p class="text-[10px]">VA</p><p class="font-bold text-blue-400">${s.toFixed(1)}</p></div><div class="bg-black/40 p-3 rounded"><p class="text-[10px]">VAR</p><p class="font-bold text-yellow-400">${q.toFixed(1)}</p></div><div class="bg-black/40 p-3 rounded"><p class="text-[10px]">PF</p><p class="font-bold text-cyan-400">${pf}</p></div>`;
        }

        window.onload = initResistor;
    </script>
</body>
</html>
